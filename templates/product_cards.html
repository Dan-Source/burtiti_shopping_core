<section class="bg-gray-50 py-8 antialiased dark:bg-gray-900 md:py-12">
  <div class="mx-auto max-w-screen-xl px-4 2xl:px-0">
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-semibold text-gray-900 dark:text-white">Produtos</h2>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Selecao dos produtos mais recentes</p>
      </div>
    </div>

    <div class="grid gap-4 sm:grid-cols-2 md:gap-6 lg:grid-cols-3 xl:grid-cols-4">
      {% for product in products %}
      <article class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-700 dark:bg-gray-800">
        <a href="{{ product.url }}" class="block h-52 overflow-hidden rounded-lg bg-gray-100 dark:bg-gray-700">
          {% if product.image_url %}
          <img src="{{ product.image_url }}" alt="{{ product.title }}" class="h-full w-full object-cover" />
          {% else %}
          <div class="flex h-full w-full items-center justify-center text-sm text-gray-400 dark:text-gray-500">Sem imagem</div>
          {% endif %}
        </a>

        <div class="pt-4">
          <a href="{{ product.url }}" class="line-clamp-2 text-base font-semibold text-gray-900 hover:underline dark:text-white">
            {{ product.title }}
          </a>

          <div class="mt-4 flex items-center justify-between gap-4">
            <p class="text-xl font-extrabold text-gray-900 dark:text-white">{{ product.price }}</p>
            <a href="{{ product.url }}" class="inline-flex items-center rounded-lg bg-primary-700 px-4 py-2 text-sm font-medium text-white hover:bg-primary-800 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800">
              Ver produto
            </a>
          </div>
        </div>
      </article>
      {% empty %}
      <div class="col-span-full rounded-lg border border-dashed border-gray-300 bg-white p-8 text-center dark:border-gray-600 dark:bg-gray-800">
        <p class="text-gray-600 dark:text-gray-300">Nenhum produto encontrado.</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
